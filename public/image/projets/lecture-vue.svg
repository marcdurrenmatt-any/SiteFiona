<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 220" fill="none">
  <rect width="400" height="220" fill="#e7e5e4"/>
  <!-- feuille -->
  <rect x="74" y="40" width="252" height="142" rx="2" fill="#fafaf9" stroke="#d6d3d1" stroke-width="1"/>
  <!-- portée régulière -->
  <g stroke="#78716c" stroke-opacity="0.5" stroke-width="1.2" stroke-linecap="round">
    <path d="M96 76h208"/><path d="M96 88h208"/><path d="M96 100h208"/><path d="M96 112h208"/><path d="M96 124h208"/>
  </g>
  <!-- début de système : barre + deux points de mesure -->
  <path stroke="#1c1917" stroke-width="2.6" stroke-linecap="round" d="M92 72v56"/>
  <path stroke="#1c1917" stroke-width="1.4" stroke-linecap="round" d="M98 72v56"/>
  <circle cx="114" cy="96" r="3.5" fill="#1c1917" fill-opacity="0.35"/>
  <circle cx="114" cy="112" r="3.5" fill="#1c1917" fill-opacity="0.35"/>
  <!-- trois notes alignées sur la portée -->
  <g stroke="#74a2ff" stroke-width="2" stroke-linecap="round">
    <ellipse cx="158" cy="88" rx="5.5" ry="4.5" fill="#74a2ff" fill-opacity="0.5" stroke="none"/>
    <path d="M164 88v26"/>
    <ellipse cx="196" cy="106" rx="5.5" ry="4.5" fill="#74a2ff" fill-opacity="0.5" stroke="none"/>
    <path d="M202 106v22"/>
    <ellipse cx="238" cy="82" rx="5.5" ry="4.5" fill="#74a2ff" fill-opacity="0.5" stroke="none"/>
    <path d="M244 82v32"/>
  </g>
  <!-- crayon -->
  <path stroke="#ff7a00" stroke-width="3.5" stroke-linecap="round" d="M276 162 336 82"/>
  <path fill="#292524" d="M334 80 344 90 338 94z"/>
  <ellipse cx="200" cy="196" rx="72" ry="5" fill="#1c1917" fill-opacity="0.05"/>
</svg>
